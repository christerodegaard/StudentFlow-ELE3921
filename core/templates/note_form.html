{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">
  {% if note %}Edit Note{% else %}Add Note{% endif %}
</h1>

<div class="card shadow-sm" style="max-width: 800px;">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label" for="{{ form.content.id_for_label }}">Note Content</label>
        {{ form.content }}
        {% if form.content.errors %}
          <div class="text-danger small mt-1">
            {{ form.content.errors }}
          </div>
        {% endif %}
      </div>

      <button type="submit" class="btn btn-primary">
        {% if note %}Update Note{% else %}Save Note{% endif %}
      </button>

      <a href="{% url 'task_detail' task.id %}" class="btn btn-outline-secondary">
        Cancel
      </a>
    </form>
  </div>
</div>

{% endblock %}
