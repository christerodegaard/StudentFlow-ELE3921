{% extends "base.html" %}

{% block title %}Edit Enrollment{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>Edit enrollment</h1>
    <p>{{ enrollment.user.username }} in {{ course.code }}</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save</button>
    </form>
</div>
{% endblock %}
