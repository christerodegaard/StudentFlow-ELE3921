{% extends "base.html" %}

{% block title %}Join Course{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 700px;">
    <h1 class="mb-3">Join course</h1>
    <p class="text-muted">
        Enter the join code you received from the course instructor.
    </p>

    <div class="card shadow-sm">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-primary">Join</button>
                    <a href="{% url 'course_list' %}" class="btn btn-outline-secondary">Back</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
